<div class="max-w-2xl mx-auto py-10 px-4">

  <!-- Page header -->
  <div class="mb-8">
    <button class="btn btn-ghost btn-sm mb-4 -ml-2 gap-1" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Back
    </button>
    <h1 class="text-4xl font-bold" style="font-family: var(--font-display)">Edit profile</h1>
    <p class="text-base-content/50 mt-2 text-sm">Update your name and profile photo.</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-16">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  } @else if (member()) {

    <div class="flex flex-col gap-6">

      <!-- Avatar card -->
      <div class="rounded-2xl bg-base-100 shadow-sm border border-base-200 p-8">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-base-content/40 mb-5">Profile photo</h2>

        <div class="flex items-center gap-6">
          <!-- Avatar preview -->
          <div class="relative shrink-0 w-24 h-24">
            <img
              [ngSrc]="member()!.imageUrl || '/user.png'"
              alt="Profile photo"
              width="96"
              height="96"
              priority
              class="rounded-full object-cover ring-4 ring-primary/20"
            />
            @if (uploadingPhoto()) {
              <div class="absolute inset-0 rounded-full bg-base-100/80 flex items-center justify-center">
                <span class="loading loading-spinner loading-sm text-primary"></span>
              </div>
            }
          </div>

          <!-- Upload button -->
          <div class="flex flex-col gap-2">
            <label
              for="photo-upload"
              class="btn btn-outline btn-sm rounded-full cursor-pointer"
              [class.btn-disabled]="uploadingPhoto()"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
              </svg>
              Upload photo
            </label>
            <input
              id="photo-upload"
              type="file"
              accept="image/*"
              class="hidden"
              (change)="onFileSelected($event)"
              [disabled]="uploadingPhoto()"
            />
            <p class="text-xs text-base-content/40">JPG, PNG or WebP · Max 10 MB</p>
          </div>
        </div>
      </div>

      <!-- Info card -->
      <div class="rounded-2xl bg-base-100 shadow-sm border border-base-200 p-8 flex flex-col gap-6">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-base-content/40">Account info</h2>

        <!-- Display name -->
        <div class="form-control">
          <label class="label pb-1.5">
            <span class="label-text font-semibold">Display name</span>
          </label>
          <input
            id="displayName"
            [(ngModel)]="form.displayName"
            name="displayName"
            type="text"
            class="input input-bordered w-full"
            placeholder="Your display name"
            maxlength="50"
          />
        </div>

        <!-- Email (read-only) -->
        <div class="form-control">
          <label class="label pb-1.5">
            <span class="label-text font-semibold">Email</span>
            <span class="label-text-alt text-base-content/40">Cannot be changed here</span>
          </label>
          <input
            type="email"
            class="input input-bordered w-full opacity-60 cursor-not-allowed"
            [value]="member()!.email"
            readonly
          />
        </div>

        <!-- Save button -->
        <button
          class="btn btn-primary w-full rounded-full"
          (click)="save()"
          [disabled]="saving() || !form.displayName.trim()"
        >
          @if (saving()) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Save changes
        </button>
      </div>

    </div>

  }
</div>
